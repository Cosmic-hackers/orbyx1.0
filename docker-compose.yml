version: "3.9"

services:
  # ── Redis Cache ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=sqlite:///data/satellites.db
      - LOG_DIR=/app/logs
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  # ── Streamlit Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    ports:
      - "8501:8501"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=sqlite:///data/satellites.db
      - LOG_DIR=/app/logs
    env_file:
      - .env
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      - api
      - redis
    restart: unless-stopped
    command: streamlit run frontend/app.py --server.port=8501 --server.headless=true --server.address=0.0.0.0

volumes:
  redis_data:
  app_data:
  app_logs:
